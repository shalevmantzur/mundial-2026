<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0A1612" />
<title>ניחוש מונדיאל 2026</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ניחוש מונדיאל" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ============================================================
   ניחוש מונדיאל 2026 — עיצוב "אצטדיון בלילה"
   פלטה: pitch-night dark teal + electric lime + gold
   ============================================================ */
:root{
  --bg:        #0A1612;   /* רקע ראשי - ירקרק כהה מאוד */
  --bg-2:      #0E1C17;   /* רקע משני */
  --surface:   #13241D;   /* כרטיסים */
  --surface-2: #1A2E25;   /* כרטיסים מודגשים */
  --line:      #243B30;   /* קווי הפרדה */
  --lime:      #C6F24E;   /* הדגשה ראשית - ליים חשמלי */
  --lime-dim:  #9ec23e;
  --coral:     #FF6B4A;   /* הדגשה משנית - אזהרות/CTA */
  --gold:      #F5C842;   /* טבלת אלופים */
  --text:      #F2F5EE;   /* טקסט ראשי */
  --text-dim:  #9DB0A4;   /* טקסט משני */
  --text-mut:  #5F7568;   /* טקסט מעומעם */
  --good:      #4ADE80;
  --bad:       #F87171;
  --radius:    16px;
  --radius-sm: 11px;
  --shadow:    0 10px 30px -12px rgba(0,0,0,.6);
  --maxw:      560px;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(198,242,78,.07), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(255,107,74,.06), transparent 55%),
    var(--bg);
  color:var(--text);
  font-family:'Heebo',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100dvh;
  font-size:16px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
h1,h2,h3,h4,.display{font-family:'Rubik',sans-serif;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
::selection{background:var(--lime);color:#0A1612}

/* ---------- מבנה אפליקציה ---------- */
#root{max-width:var(--maxw);margin:0 auto;min-height:100dvh;position:relative;
  display:flex;flex-direction:column}
.app-main{flex:1;padding:0 16px 110px;width:100%}

/* ---------- כותרת עליונה ---------- */
.topbar{position:sticky;top:0;z-index:30;
  background:linear-gradient(180deg, var(--bg) 70%, transparent);
  padding:max(14px,env(safe-area-inset-top)) 16px 12px;
  display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:10px;font-family:'Rubik';font-weight:800;font-size:18px}
.brand .ball{width:30px;height:30px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, var(--lime), var(--lime-dim));
  display:grid;place-items:center;color:#0A1612;font-size:15px;box-shadow:0 0 18px rgba(198,242,78,.4)}
.brand small{display:block;font-family:'Heebo';font-weight:500;font-size:11px;color:var(--text-mut);letter-spacing:.04em}
.chip-user{display:flex;align-items:center;gap:8px;background:var(--surface);
  border:1px solid var(--line);border-radius:999px;padding:5px 6px 5px 12px;font-size:13px;font-weight:600}
.chip-user .av{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;
  font-family:'Rubik';font-weight:700;font-size:12px;color:#0A1612;
  background:linear-gradient(135deg,var(--lime),var(--gold))}

/* ---------- כרטיסים ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px;box-shadow:var(--shadow)}
.card+.card{margin-top:12px}
.section-title{font-family:'Rubik';font-weight:800;font-size:13px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--text-dim);margin:22px 4px 12px;display:flex;
  align-items:center;gap:8px}
.section-title::before{content:"";width:14px;height:3px;border-radius:2px;background:var(--lime)}

/* ---------- כפתורים ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border:none;border-radius:var(--radius-sm);padding:13px 18px;font-weight:700;
  font-size:15px;transition:.15s transform,.15s filter,.15s background;width:100%}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--lime);color:#0A1612;box-shadow:0 6px 20px -6px rgba(198,242,78,.5)}
.btn-primary:hover{filter:brightness(1.05)}
.btn-ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--line)}
.btn-coral{background:var(--coral);color:#fff}
.btn-sm{padding:9px 14px;font-size:13px;width:auto;border-radius:9px}
.btn:disabled{opacity:.45;pointer-events:none}

/* ---------- טפסים ---------- */
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--text-dim);margin-bottom:7px}
.input{width:100%;background:var(--bg-2);border:1.5px solid var(--line);border-radius:11px;
  padding:13px 14px;color:var(--text);font-size:16px;transition:.15s border}
.input:focus{outline:none;border-color:var(--lime);box-shadow:0 0 0 3px rgba(198,242,78,.12)}
.input::placeholder{color:var(--text-mut)}
.row{display:flex;gap:10px}
.row>*{flex:1}

/* ---------- מסך כניסה ---------- */
.auth-wrap{min-height:100dvh;display:flex;flex-direction:column;justify-content:center;
  padding:24px 22px;max-width:var(--maxw);margin:0 auto;width:100%}
.auth-hero{text-align:center;margin-bottom:28px}
.auth-hero .big-ball{width:64px;height:64px;border-radius:50%;margin:0 auto 16px;
  background:radial-gradient(circle at 35% 30%, var(--lime), var(--lime-dim));
  display:grid;place-items:center;font-size:32px;color:#0A1612;
  box-shadow:0 0 40px rgba(198,242,78,.45)}
.auth-hero h1{font-size:34px;font-weight:900;margin:0 0 6px;line-height:1.05}
.auth-hero h1 .accent{color:var(--lime)}
.auth-hero p{color:var(--text-dim);margin:0;font-size:15px}
.tabs{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:12px;
  padding:4px;margin-bottom:20px}
.tabs button{flex:1;border:none;background:transparent;color:var(--text-dim);font-weight:700;
  padding:11px;border-radius:9px;font-size:14px;transition:.15s}
.tabs button.on{background:var(--lime);color:#0A1612}

/* ---------- משחקים ---------- */
.match-card{position:relative;overflow:hidden}
.match-card .meta{display:flex;justify-content:space-between;align-items:center;
  font-size:12px;color:var(--text-mut);font-weight:600;margin-bottom:12px}
.match-card .grp{background:var(--surface-2);border:1px solid var(--line);
  padding:3px 9px;border-radius:6px;color:var(--text-dim)}
.match-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:14px}
.team{display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center}
.team .flag{font-size:34px;line-height:1}
.team .nm{font-family:'Rubik';font-weight:700;font-size:15px}
.vs{font-family:'Rubik';font-weight:800;color:var(--text-mut);font-size:13px}
.score-final{font-family:'Rubik';font-weight:900;font-size:28px;color:var(--lime)}
.status-pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px}
.status-open{background:rgba(198,242,78,.14);color:var(--lime)}
.status-locked{background:rgba(255,107,74,.14);color:var(--coral)}
.status-done{background:rgba(245,200,66,.14);color:var(--gold)}
.pred-summary{background:var(--bg-2);border:1px dashed var(--line);border-radius:10px;
  padding:9px 12px;font-size:13px;color:var(--text-dim);margin-top:10px;display:flex;
  align-items:center;gap:8px}
.pred-summary b{color:var(--lime)}

/* ---------- מסך ניחוש ---------- */
.scorebox{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;
  background:var(--bg-2);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:8px}
.scorebox .team{gap:10px}
.score-input{width:64px;height:64px;text-align:center;font-family:'Rubik';font-weight:900;
  font-size:30px;background:var(--surface);border:2px solid var(--line);border-radius:14px;color:var(--text)}
.score-input:focus{outline:none;border-color:var(--lime)}
.seg{display:flex;gap:8px;margin-top:4px}
.seg button{flex:1;background:var(--bg-2);border:1.5px solid var(--line);color:var(--text-dim);
  border-radius:10px;padding:11px;font-weight:700;font-size:14px;transition:.12s}
.seg button.on{background:var(--lime);color:#0A1612;border-color:var(--lime)}
.taglist{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.tag{display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);
  border:1px solid var(--line);border-radius:999px;padding:7px 12px;font-size:13px;font-weight:600}
.tag .x{cursor:pointer;color:var(--text-mut);font-weight:800}
.tag.on{background:var(--lime);color:#0A1612;border-color:var(--lime)}

/* ---------- טבלת ניקוד ---------- */
.lb-row{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:12px;
  background:var(--surface);border:1px solid var(--line);margin-bottom:8px;transition:.15s}
.lb-row.me{border-color:var(--lime);background:linear-gradient(90deg,rgba(198,242,78,.07),var(--surface))}
.lb-rank{font-family:'Rubik';font-weight:900;font-size:18px;width:30px;text-align:center;color:var(--text-mut)}
.lb-row.top1 .lb-rank{color:var(--gold)}
.lb-row.top2 .lb-rank{color:#D4D7DD}
.lb-row.top3 .lb-rank{color:#CD8B5C}
.lb-av{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;
  font-family:'Rubik';font-weight:800;color:#0A1612;font-size:15px;flex:none;
  background:linear-gradient(135deg,var(--lime),var(--gold))}
.lb-name{flex:1;font-weight:700}
.lb-name small{display:block;font-weight:500;color:var(--text-mut);font-size:12px}
.lb-pts{font-family:'Rubik';font-weight:900;font-size:20px;color:var(--lime)}
.lb-pts span{font-size:11px;color:var(--text-mut);font-weight:600;display:block;text-align:center}

/* ---------- ניווט תחתון ---------- */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:40;
  max-width:var(--maxw);margin:0 auto;
  background:rgba(14,28,23,.92);backdrop-filter:blur(16px);
  border-top:1px solid var(--line);
  display:flex;padding:8px 8px max(8px,env(safe-area-inset-bottom));gap:4px}
.tabbar button{flex:1;border:none;background:transparent;color:var(--text-mut);
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px;
  border-radius:12px;font-size:10.5px;font-weight:600;transition:.15s}
.tabbar button .ic{font-size:20px;line-height:1}
.tabbar button.on{color:var(--lime)}
.tabbar button.on .ic{transform:translateY(-1px)}

/* ---------- שונות ---------- */
.empty{text-align:center;padding:50px 20px;color:var(--text-mut)}
.empty .ic{font-size:46px;margin-bottom:12px;opacity:.6}
.empty h3{font-family:'Rubik';color:var(--text-dim);margin:0 0 6px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:60;
  background:var(--surface-2);border:1px solid var(--line);color:var(--text);
  padding:12px 20px;border-radius:12px;font-weight:600;font-size:14px;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:8px;max-width:90vw;animation:toastIn .3s}
.toast.good{border-color:var(--good)}.toast.bad{border-color:var(--bad)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}}
.spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--lime);
  border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.badge{display:inline-block;background:var(--surface-2);border:1px solid var(--line);
  color:var(--text-dim);font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
.divider{height:1px;background:var(--line);margin:14px 0}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
.stat .v{font-family:'Rubik';font-weight:900;font-size:22px;color:var(--lime)}
.stat .l{font-size:11px;color:var(--text-mut);font-weight:600;margin-top:2px}
.note{font-size:12.5px;color:var(--text-mut);line-height:1.6}
.admin-rule{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
.admin-rule:last-child{border-bottom:none}
.admin-rule .rl-name{flex:1;font-weight:600;font-size:14px}
.admin-rule .rl-desc{display:block;font-size:11px;color:var(--text-mut);font-weight:400}
.pts-input{width:62px;text-align:center;background:var(--bg-2);border:1.5px solid var(--line);
  border-radius:9px;padding:9px;color:var(--lime);font-family:'Rubik';font-weight:800;font-size:16px}
.pts-input:focus{outline:none;border-color:var(--lime)}

/* ---------- פאנל דיבאג ---------- */
#dbg-fab{position:fixed;bottom:96px;right:12px;z-index:70;width:46px;height:46px;border-radius:50%;
  background:var(--surface-2);border:1px solid var(--line);color:var(--text-dim);font-size:20px;
  display:grid;place-items:center;box-shadow:var(--shadow)}
#dbg-fab.err{border-color:var(--bad);color:var(--bad);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)}50%{box-shadow:0 0 0 8px rgba(248,113,113,0)}}
.dbg-panel{position:fixed;inset:0;z-index:80;background:rgba(7,14,11,.96);
  backdrop-filter:blur(6px);display:flex;flex-direction:column;padding:env(safe-area-inset-top) 0 0}
.dbg-head{display:flex;align-items:center;justify-content:space-between;padding:16px;
  border-bottom:1px solid var(--line)}
.dbg-head h3{margin:0;font-size:16px;display:flex;align-items:center;gap:8px}
.dbg-meta{padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:8px;border-bottom:1px solid var(--line)}
.dbg-kv{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:8px 11px}
.dbg-kv .k{font-size:10px;color:var(--text-mut);font-weight:700;text-transform:uppercase}
.dbg-kv .v{font-size:13px;font-weight:700;margin-top:2px;word-break:break-all}
.dbg-kv .v.ok{color:var(--good)}.dbg-kv .v.no{color:var(--bad)}
.dbg-actions{display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.dbg-log{flex:1;overflow-y:auto;padding:8px 12px;font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:11.5px}
.dbg-line{padding:6px 8px;border-bottom:1px solid rgba(36,59,48,.5);display:flex;gap:8px;line-height:1.45}
.dbg-line .t{color:var(--text-mut);flex:none}
.dbg-line.info .lv{color:var(--lime)}
.dbg-line.warn{color:#fbbf24}.dbg-line.warn .lv{color:#fbbf24}
.dbg-line.error{color:var(--bad)}.dbg-line.error .lv{color:var(--bad)}
.dbg-line .lv{font-weight:700;flex:none}
.dbg-line .msg{flex:1;word-break:break-word;white-space:pre-wrap;color:var(--text-dim)}

@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="root">
  <div class="auth-wrap"><div class="spinner"></div></div>
</div>

<button onclick="handleGoogleSignIn()" style="position: fixed; bottom: 20px; right: 20px; background: #4285F4; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; z-index: 100;">
  👤 Google
</button>

<script>
async function handleGoogleSignIn() {
  try {
    await DB.signInWithGoogle();
  } catch(e) {
    alert('שגיאה: ' + e.message);
  }
}

// בדוק אם יש session מGoogle
if(DB && DB.handleAuthCallback) {
  DB.handleAuthCallback();
}
</script>

<!-- כפתור דיבאג צף -->
<button id="dbg-fab" title="פאנל דיבאג" onclick="window.__toggleDebug&&window.__toggleDebug()">🐞</button>
<div id="dbg-mount"></div>
<div id="toast-mount"></div>

<!-- ספריות (נטענות מהרשת בעת פריסה) -->
<!-- ספריות קלות (ללא Babel — טעינה מהירה, ללא תרגום בדפדפן) -->
<script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/htm@3.1.1/dist/htm.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>

<!-- רישום Service Worker ל-PWA -->
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(e=>console.warn('SW failed',e)));
}
</script>
</body>
</html>
